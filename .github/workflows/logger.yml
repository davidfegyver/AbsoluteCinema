name: AbsoluteCinemaBot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Collect data
        env:
          FILM_ID: "8035o2r"
          MARKET_ID: "10102"
          UNTIL_DATE: "2027-01-01"
        run: |
          python scripts/collect.py

      - name: Commit snapshots
        run: |
          git config user.name "AbsoluteCinemaBot"
          git config user.email "cinema@davidfegyver.hu"
          git add data/latest.json data/history.jsonl data/presentations.json data/cinemas.json
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "AbsoluteCinemaBot: Update snapshots"
          git push
